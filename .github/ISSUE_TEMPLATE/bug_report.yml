name: Bug Report
description: Report a bug or unexpected behavior
title: '[BUG] '
labels: ''
body:
  - type: dropdown
    id: issue-type
    attributes:
      label: Type
      description: Select the type of issue
      options:
        - Bug
        - Feature Request
        - Improvement
        - Question
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the issue
      placeholder: Describe the issue here...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: false
